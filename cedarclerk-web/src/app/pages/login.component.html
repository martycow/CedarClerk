<div class="login-wrap">
    <h1>Cedar Clerk 🐮</h1>
    <input [(ngModel)]="email" placeholder="Email" type="email" autocomplete="username">
    <input [(ngModel)]="inviteCode" placeholder="Invite Code" type="text" autocomplete="off">
    <input [(ngModel)]="password" placeholder="Password" type="password" autocomplete="current-password" (keyup.enter)="submit()">

    <button (click)="submit()" [disabled]="busy()">
        {{ busy() ? '...' : 'Login' }}
    </button>

    <button (click)="register()" [disabled]="busy()">
        {{ busy() ? '...' : 'Register' }}
    </button>

    @if (error()) { <p class="error">{{ error() }}</p> }
</div>
