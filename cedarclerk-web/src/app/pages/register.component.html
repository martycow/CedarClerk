<div class="auth-page">
    <button class="theme-toggle" (click)="theme.toggle()" title="Toggle theme">
        {{ theme.theme() === 'dark' ? '☀' : '☾' }}
    </button>

    <div class="auth-card">
        <div class="auth-header">
            <app-cedar-logo [size]="28"></app-cedar-logo>
            <div class="auth-title">Join the herd</div>
            <div class="auth-tagline">Cedar Clerk is invite-only for now.<br>Ask Marty for a code.</div>
        </div>

        <div class="field">
            <label for="cc-reg-email">Email</label>
            <input id="cc-reg-email" [(ngModel)]="email" placeholder="you@example.com" type="email" autocomplete="username">
        </div>
        <div class="field">
            <label for="cc-reg-pass">Password</label>
            <input id="cc-reg-pass" [(ngModel)]="password" placeholder="8+ characters" type="password" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="cc-reg-invite">Invite code</label>
            <input id="cc-reg-invite" class="mono" [(ngModel)]="inviteCode" placeholder="CEDAR-MOO-0" type="text" autocomplete="off" (keyup.enter)="submit()">
        </div>

        @if (error()) {
        <div class="field-error">{{ error() }}</div>
        }

        <button class="primary-btn" (click)="submit()" [disabled]="busy()">
            {{ busy() ? '…' : 'Create account' }}
        </button>

        <div class="auth-footer">Already have one? <a routerLink="/login">Log in</a></div>
    </div>
</div>
